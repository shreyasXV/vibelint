name: 'VibeLint'
description: 'AI Code Audit — catches bugs your AI coding tool introduces'
author: 'VibeLint'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token for posting PR comments'
    required: true
    default: ${{ github.token }}
  fail-below:
    description: 'Fail the check if Vibe Score is below this threshold (0-100, 0 to disable)'
    required: false
    default: '0'
  languages:
    description: 'Languages to check (comma-separated: python,javascript,typescript,go,rust)'
    required: false
    default: 'python,javascript,typescript,go,rust'
  config:
    description: 'Path to VibeLint config file (default: .vibelint.yml)'
    required: false
    default: '.vibelint.yml'
  ai-critic:
    description: 'Enable AI Critic gate (requires OPENAI_API_KEY or ANTHROPIC_API_KEY secret)'
    required: false
    default: 'false'
  ai-critic-model:
    description: 'LLM model for AI Critic (default: gpt-4o-mini)'
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'dist/index.js'
